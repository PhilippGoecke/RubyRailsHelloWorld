apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  labels:
    app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: docker.io/library/mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-mongodb
  labels:
    app: rails-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rails-mongodb
  template:
    metadata:
      labels:
        app: rails-mongodb
    spec:
      containers:
        - name: rails-mongodb
          image: localhost/rails-demo:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGODB_HOST
              value: "mongo:27017"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: rails-mongodb
spec:
  type: NodePort
  selector:
    app: rails-mongodb
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30004
